name: 2. Add Identifiers
run-name: Add Identifiers (${{ github.ref_name }})
on:
  workflow_dispatch:

jobs:
  validate:
    name: Validate Secrets
    uses: ./.github/workflows/validate_secrets.yml
    secrets: inherit
  
  identifiers:
    name: Add Identifiers
    needs: validate
    runs-on: macos-15
    steps:
      # Checkout the repository
      - name: Checkout Repo
        uses: actions/checkout@v4
      
      # Patch Fastlane Match to prevent table output (avoid table printing for clarity)
      - name: Patch Match Tables
        run: |
          TABLE_PRINTER_PATH=$(ruby -e 'puts Gem::Specification.find_by_name("fastlane").gem_dir')/match/lib/match/table_printer.rb
          if [ -f "$TABLE_PRINTER_PATH" ]; then
            sed -i "" "/puts(Terminal::Table.new(params))/d" "$TABLE_PRINTER_PATH"
          else
            echo "table_printer.rb not found"
            exit 1
          fi

      # Install project dependencies via Bundler
      - name: Install Project Dependencies
        run: bundle install

      # Sync clock with Windows time server (workaround for GitHub Actions time drift issue)
      - name: Sync Clock
        run: sudo sntp -sS time.windows.com
      
      # Create or update the app identifiers using Fastlane
      - name: Fastlane Provision Identifiers
        run: bundle exec fastlane identifiers
        env:
          TEAMID: ${{ secrets.TEAMID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
